networks:
  ingressos-network:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
  mongo_config:
  redis_data:
  kafka_data:
  kafka_secrets:
  keycloak_data:

services:
  # 1. Banco Relacional (Transações, Reservas)
  mysql:
    image: mysql:8.4
    container_name: ingressos_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ingressos_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ingressos-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Banco NoSQL (Catálogo de Eventos)
  mongodb:
    image: mongo:8.0
    container_name: ingressos_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - ingressos-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Cache em Memória (Rate Limiting, Locks e Sessões)
  redis:
    image: redis:7.2-alpine
    container_name: ingressos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ingressos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Mensageria Assíncrona (Confluent KRaft)
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: ingressos_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
      - kafka_secrets:/etc/kafka/secrets
    networks:
      - ingressos-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 5. Gestão de Identidade e Acesso (Keycloak IAM / JWT)
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ingressos_keycloak
    command: start-dev
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - ingressos-network

  # 6. Observabilidade e Rastreamento Distribuído (Zipkin)
  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: ingressos_zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - ingressos-network