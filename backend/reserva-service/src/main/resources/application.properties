# --- Configuracoes Basicas do Servidor ---
server.port=8083
spring.application.name=reserva-service

# --- Banco de Dados Relacional (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3306/ingressos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Hibernate e Flyway (Padrao de Arquitetura) ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- Seguranca Zero-Trust (Keycloak JWT) ---
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/ingressos-app

# --- Monitoramento e Healthchecks (Actuator) ---
management.endpoints.web.exposure.include=health, info
management.endpoint.health.show-details=always

# --- Observabilidade e Tracing (Micrometer + Zipkin Starter) ---
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans