openapi: 3.0.3
info:
  title: API de Catálogo de Eventos
  version: 1.0.0
  description: API responsável pela listagem e detalhamento dos eventos, setores e preços disponíveis para compra.
servers:
  - url: http://localhost:8080/api/v1
    description: Servidor Local (Gateway ou Direto)

paths:
  /eventos:
    get:
      summary: Lista todos os eventos disponíveis
      description: Retorna uma lista paginada de eventos ativos no catálogo, com suporte a filtros.
      operationId: listarEventos
      parameters:
        - name: page
          in: query
          description: Número da página (zero-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Quantidade de itens por página
          schema:
            type: integer
            default: 20
        - name: categoria
          in: query
          description: Filtra eventos por categoria
          schema:
            type: string
            enum: [SHOW, TEATRO, ESPORTE, FESTIVAL, STAND_UP]
      responses:
        '200':
          description: Lista paginada de eventos retornada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/EventoResumo'
                  totalElements:
                    type: integer
                  totalPages:
                    type: integer
        '500':
          $ref: '#/components/responses/InternalServerError'

  /eventos/{id}:
    get:
      summary: Busca detalhes de um evento específico
      description: Retorna todas as informações de um evento, incluindo seus setores, disponibilidade e tabela de preços.
      operationId: buscarEventoPorId
      parameters:
        - name: id
          in: path
          required: true
          description: ID único do evento
          schema:
            type: string
      responses:
        '200':
          description: Detalhes do evento retornados com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventoDetalhe'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    EventoResumo:
      type: object
      properties:
        id:
          type: string
          example: "65a1b2c3d4e5f67890abcdef"
        titulo:
          type: string
          example: "Festival de Rock Nacional 2026"
        categoria:
          type: string
          enum: [SHOW, TEATRO, ESPORTE, FESTIVAL, STAND_UP]
          example: "FESTIVAL"
        status:
          type: string
          enum: [AGUARDANDO_VENDAS, VENDAS_ABERTAS, ESGOTADO, CANCELADO]
          example: "VENDAS_ABERTAS"
        dataHora:
          type: string
          format: date-time
          example: "2026-11-15T20:00:00Z"
        dataAberturaVendas:
          type: string
          format: date-time
          example: "2026-05-01T10:00:00Z"
        local:
          type: string
          example: "Allianz Parque, SP"
        imagemUrl:
          type: string
          example: "https://minhacdn.com/eventos/rock-nacional.jpg"

    EventoDetalhe:
      allOf:
        - $ref: '#/components/schemas/EventoResumo'
        - type: object
          properties:
            descricao:
              type: string
              example: "O maior festival de rock do Brasil com mais de 10 bandas."
            setores:
              type: array
              items:
                $ref: '#/components/schemas/Setor'

    Setor:
      type: object
      properties:
        id:
          type: string
          example: "setor-pista-premium"
        nome:
          type: string
          example: "Pista Premium"
        capacidadeTotal:
          type: integer
          example: 5000
        ingressosDisponiveis:
          type: integer
          example: 1250
        precos:
          type: array
          items:
            $ref: '#/components/schemas/Preco'

    Preco:
      type: object
      properties:
        tipoIngresso:
          type: string
          enum: [INTEIRA, MEIA_ESTUDANTE, MEIA_IDOSO, MEIA_PCD]
          example: "INTEIRA"
        valor:
          type: number
          format: double
          example: 350.00

    ErroPadrao:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string

  responses:
    NotFoundError:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErroPadrao'
    InternalServerError:
      description: Erro interno do servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErroPadrao'