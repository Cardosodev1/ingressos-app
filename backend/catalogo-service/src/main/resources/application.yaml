spring:
  application:
    name: catalogo-service

  data:
    # Configuração de Conexão com o MongoDB (via Docker)
    mongodb:
      uri: mongodb://admin:admin@localhost:27017/ingressos_db?authSource=admin
      auto-index-creation: true

    # Configuração de Conexão com o Redis (via Docker)
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/ingressos-app

server:
  port: 8082

# Configurações para expor os Healthchecks (Monitoramento do Docker/Kubernetes)
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always